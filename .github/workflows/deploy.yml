name: Deploy marimo wasm to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Inject dynamic wheel version
        run: |
          NEW_VERSION="0.1.0+build.${{ github.run_number }}"
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" public/pyproject.toml
          sed -i "s|portfolio_logic-.*-py3-none-any.whl|portfolio_logic-$NEW_VERSION-py3-none-any.whl|g" backtest_notebook.py

      - name: Build local wheel
        run: |
          uv build public/
          echo "--- Actual Wheel Filename ---"
          ls public/dist/
          echo "--- Injected Notebook Line ---"
          grep "micropip.install" backtest_notebook.py

      - name: Export Notebook to WASM
        run: uv run marimo export html-wasm backtest_notebook.py -o publish/index.html --no-sandbox --force

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
